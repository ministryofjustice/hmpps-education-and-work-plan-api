generic-service:
  nameOverride: hmpps-education-and-work-plan-api
  replicaCount: 4

  image:
    repository: ghcr.io/ministryofjustice/hmpps-education-and-work-plan-api
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: hmpps-education-and-work-plan-api-cert
    annotations:
      # Secure the endpoints related to k8s jobs from outside the Kubernetes ingress
      nginx.ingress.kubernetes.io/server-snippet: |
        server_tokens off;
        location /queue-admin/retry-all-dlqs {
          deny all;
          return 401;
        }

  # Used to access resources like SQS queues and SNS topics
  serviceAccountName: hmpps-education-and-work-plan

  # Container resources.
  # Sized from the live prod JVM (jcmd on the highest pod): non-heap committed is large and steady —
  # ~250Mi metaspace, ~150-290Mi thread stacks (~290 threads), ~240Mi reserved code cache, plus the
  # Application Insights agent's native memory and Netty direct buffers — giving a ~700Mi non-heap
  # baseline before any heap. With the now-effective 768m heap (see JAVA_TOOL_OPTIONS) worst-case RSS is
  # ~768m + ~700Mi ≈ 1.45Gi, so the limit is set to 1800Mi to leave real headroom; request matches the
  # observed ~950Mi steady-state RSS so the scheduler reserves enough and the pod isn't evicted under
  # node memory pressure. Revisit once the proper search-endpoint fix (TODOs in PrisonerSearchService)
  # shrinks the per-request footprint — the heap (and these numbers) can then come back down.
  resources:
    requests:
      cpu: 10m
      memory: 1024Mi
    limits:
      cpu: "1"
      memory: 1800Mi

  # Environment variables to load into the deployment
  env:
    # IMPORTANT: the Docker ENTRYPOINT is exec-form (`["java", ...]`), which does NOT expand $JAVA_OPTS,
    # and the bare `java` binary does not read JAVA_OPTS itself. Heap settings therefore have to go via
    # JAVA_TOOL_OPTIONS, which the JVM reads natively at startup.
    # Previously `JAVA_OPTS: "-Xmx512m"` was silently ignored: the JVM fell back to its container default
    # of 25% of the memory limit (~250Mi heap on a 1000Mi limit) — roughly half the intended heap, and
    # the direct cause of how easily the prison search endpoint exhausted heap and threw OutOfMemoryError.
    # NOTE: no -XX:+HeapDumpOnOutOfMemoryError here on purpose — main already sets -XX:+ExitOnOutOfMemoryError
    # (RR-2675) so the container restarts immediately on OOM, which would lose a dump written to the
    # ephemeral fs (and a ~768Mi dump risks an ephemeral-storage eviction). Capturing dumps properly needs
    # a pod-scoped emptyDir volume mounted for -XX:HeapDumpPath — left as a follow-up.
    JAVA_TOOL_OPTIONS: "-Xmx768m"
    SERVER_PORT: "8080"
    SPRING_PROFILES_ACTIVE: "logstash"
    APPLICATIONINSIGHTS_CONNECTION_STRING: "InstrumentationKey=$(APPINSIGHTS_INSTRUMENTATIONKEY);IngestionEndpoint=https://northeurope-0.in.applicationinsights.azure.com/;LiveEndpoint=https://northeurope.livediagnostics.monitor.azure.com/"
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.json
    HMPPS_AUTH_URL: https://sign-in.hmpps.service.justice.gov.uk/auth
    PRISON_API_URL: https://prison-api.prison.service.justice.gov.uk
    MANAGE_USERS_API_URL: https://manage-users-api.hmpps.service.justice.gov.uk
    PRISONER_SEARCH_API_URL: https://prisoner-search.prison.service.justice.gov.uk
    HMPPS_SAR_ADDITIONALACCESSROLE: ROLE_EDUCATION_AND_WORK_PLAN__ACTIONPLANS__RW
    HMPPS_SQS_ENABLED: true
    CIAG_KPI_PROCESSING_RULE: "PEF" # Set to PEF or PES depending on Curious support
    SERVICE_BASE_URL: "https://learningandworkprogress-api.hmpps.service.justice.gov.uk"
    PES_CONTRACT_START_DATE: 2025-10-01
    INDUCTION_EXTENSION_PERIODS: "2025-12-20:2026-01-01"
    EXEMPTION_EXTEND_DEADLINE: "ONLY_WHEN_NOT_OVERDUE"

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    hmpps-education-and-work-plan-api:
      APPINSIGHTS_INSTRUMENTATIONKEY: "APPINSIGHTS_INSTRUMENTATIONKEY"
      PRISON_API_CLIENT_ID: "PRISON_API_CLIENT_ID"
      PRISON_API_CLIENT_SECRET: "PRISON_API_CLIENT_SECRET"
      PRISONER_SEARCH_API_CLIENT_ID: "PRISONER_SEARCH_API_CLIENT_ID"
      PRISONER_SEARCH_API_CLIENT_SECRET: "PRISONER_SEARCH_API_CLIENT_SECRET"
      MANAGE_USERS_API_CLIENT_ID: "MANAGE_USERS_API_CLIENT_ID"
      MANAGE_USERS_API_CLIENT_SECRET: "MANAGE_USERS_API_CLIENT_SECRET"
    rds-postgresql-instance-output:
      DB_SERVER: "rds_instance_address"
      DB_NAME: "database_name"
      DB_USER: "database_username"
      DB_PASS: "database_password"
    digital-prison-reporting:
      DPR_USER: "DPR_USER"
      DPR_PASSWORD: "DPR_PASSWORD"

    # Inbound SQS config
    hmpps-domain-events-topic:
      HMPPS_SQS_TOPICS_DOMAINEVENTS_ARN: "topic_arn"
    education-and-work-plan-domain-events-sqs-instance-output:
      HMPPS_SQS_QUEUES_EDUCATIONANDWORKPLAN_QUEUE_NAME: "sqs_queue_name"
    education-and-work-plan-domain-events-sqs-dl-instance-output:
      HMPPS_SQS_QUEUES_EDUCATIONANDWORKPLAN_DLQ_NAME: "sqs_queue_name"
    education-and-work-plan-assessments-queue:
      HMPPS_SQS_QUEUES_ASSESSMENTEVENTS_QUEUE_NAME: "sqs_queue_name"
    education-and-work-plan-assessments-dlq:
      HMPPS_SQS_QUEUES_ASSESSMENTEVENTS_DLQ_NAME: "sqs_queue_name"

  allowlist:
    groups:
      - internal

generic-prometheus-alerts:
  targetApplication: hmpps-education-and-work-plan-api

generic-data-analytics-extractor:
  cronJobNameOverride: export-database-to-analytical-platform-cronjob
  serviceAccountName: hmpps-education-and-work-plan-prod-to-ap-s3
  cronJobSchedule: "0 1 * * *" # 1am every day
  databaseSecretName: rds-postgresql-instance-output
  destinationS3SecretName: analytical-platform-reporting-s3-irsa
  enabled: true

queueHousekeeping:
  cronJobSchedule: "*/10 * * * *"
