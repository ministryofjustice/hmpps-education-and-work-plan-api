name: Security OWASP dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "8 6 * * MON-FRI" # Every weekday at 06:08 UTC
jobs:
  security-kotlin-owasp-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Kotlin security OWASP dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_owasp.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2 WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      nvd_feed_version: '2'
      java_version: "25"
    secrets: inherit
